services:

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: anime
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d anime"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  app:
    build: .
    environment:
      SPIDER_CONFIG: /config/config.ini
    volumes:
      - ./config.docker.ini:/config/config.ini:ro
      - ./logs:/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
